description: C-DAC THEJAS32 PWM controller

compatible: "cdac,thejas32-pwm"

include: [pwm-controller.yaml, base.yaml]

properties:
  reg:
    required: true

  clock-frequency:
    type: int
    required: true
    description: Frequency of the clock feeding the controller, in Hz.

  "#pwm-cells":
    const: 3

pwm-cells:
  - channel
  - period
  - flags
