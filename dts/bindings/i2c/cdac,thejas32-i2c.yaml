description: C-DAC THEJAS32 I2C controller

compatible: "cdac,thejas32-i2c"

include: i2c-controller.yaml

properties:
  reg:
    required: true

  input-clock-frequency:
    type: int
    required: true
    description: Frequency of the clock feeding the controller, in Hz.
